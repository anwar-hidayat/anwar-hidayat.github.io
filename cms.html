<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Anwar Hidayat</title>
</head>
<body>
  <!-- JANGAN isi apa pun di sini, biarkan kosong -->

  <!-- Gunakan CDN Cloudflare yang stabil -->
  <script src="https://cdnjs.cloudflare.com"></script>

  <script>
    // Tunggu library termuat sempurna
    window.addEventListener('load', () => {
      if (window.CMS) {
        CMS.init({
          config: {
            backend: {
              name: "github",
              repo: "anwar-hidayat/anwar-hidayat.github.io",
              branch: "master",
              base_url: "https://anwar-hidayat.statistikian.workers.dev", // <--- PASTIKAN URL WORKER CLOUDFLARE ANDA BENAR
              auth_endpoint: "auth"
            },
            media_folder: "assets/images/posts",
            public_folder: "/assets/images/posts",
            collections: [{
              name: "blog",
              label: "Artikel",
              folder: "_posts",
              create: true,
              fields: [
                { label: "Layout", name: "layout", widget: "hidden", default: "post" },
                { label: "Judul", name: "title", widget: "string" },
                { label: "Isi", name: "body", widget: "markdown" }
              ]
            }]
          }
        });
      }
    });
  </script>
</body>
