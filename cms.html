<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel Lokal | Anwar Hidayat</title>
</head>
<body>
  <div id="nc-root">Memuat Sistem Admin dari Repositori Lokal...</div>

  <!-- Memanggil file dari repositori Anda sendiri (Anti Blokir ISP) -->
  <script src="/assets/js/decap-cms.js"></script>

  <script>
    window.onload = () => {
      if (window.CMS) {
        CMS.init({
          config: {
            backend: {
              name: "github",
              repo: "anwar-hidayat/anwar-hidayat.github.io",
              branch: "master",
              base_url: "https://anwar-hidayat.statistikian.workers.dev", // <--- PASTIKAN SUDAH DIGANTI
              auth_endpoint: "auth"
            },
            display_url: "https://anwar-hidayat.github.io",
            media_folder: "assets/images/posts",
            public_folder: "/assets/images/posts",
            collections: [{
              name: "blog",
              label: "Artikel",
              folder: "_posts",
              create: true,
              fields: [
                { label: "Layout", name: "layout", widget: "hidden", default: "post" },
                { label: "Judul", name: "title", widget: "string" },
                { label: "Isi", name: "body", widget: "markdown" }
              ]
            }]
          }
        });
      } else {
        document.getElementById('nc-root').innerHTML = "Gagal memuat file lokal. Pastikan path /assets/js/decap-cms.js sudah benar.";
      }
    };
  </script>
</body>
</html>
