# Pengaturan Dasar Website
title: "Blog Anwar Hidayat"
description: "Official Website of Anwar Hidayat"
url: "https://anwar-hidayat.github.io"
baseurl: "" # Biarkan kosong jika menggunakan username.github.io

# Pengaturan Penulis (Penting untuk SEO Meta)
author:
  name: "Anwar Hidayat"
  twitter: "@anwar1hidayat" # Opsional

# Struktur Link Artikel (SEO Friendly: slug judul tanpa tanggal di URL)
permalink: /:title/

# Pengaturan Markdown
markdown: kramdown
highlighter: rouge

# Plugin Wajib (GitHub Pages mendukung ini secara bawaan)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Pengaturan Paginasi (Menampilkan 5 artikel per halaman)
paginate: 5
paginate_path: "/page:num/"

# Folder yang harus diproses dan dikecualikan
include: [_posts, admin, assets]
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata

# Pengaturan Gambar untuk Decap CMS
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
