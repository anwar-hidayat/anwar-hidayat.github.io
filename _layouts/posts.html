---
layout: post
---
<article class="astra-single-post">
  <div class="post-header">
    <div class="post-meta">
      <span class="category">{{ page.categories | first | capitalize }}</span>
      <span class="separator">/</span>
      <span class="date">{{ page.date | date: "%B %d, %Y" }}</span>
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.author %}
    <div class="post-author">Oleh: <strong>{{ page.author }}</strong></div>
    {% endif %}
  </div>

  {% if page.image %}
  <div class="post-featured-image">
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  </div>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
      {% endfor %}
    </div>
  </footer>
</article>

<style>
  /* CSS Single Post Ala Astra */
  .astra-single-post {
    max-width: 800px; /* Lebih ramping agar nyaman dibaca */
    margin: 60px auto;
    padding: 0 20px;
    color: #3a3a3a;
    line-height: 1.8;
  }

  .post-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .post-meta {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 15px;
  }

  .post-meta .category {
    color: #0274be;
    font-weight: 600;
  }

  .post-title {
    font-size: 2.5rem;
    color: #222;
    margin: 0 0 20px 0;
    line-height: 1.2;
  }

  .post-featured-image img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 40px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  }

  .post-content {
    font-size: 18px;
    color: #444;
  }

  /* Styling Elemen di Dalam Konten */
  .post-content h2, .post-content h3 {
    color: #222;
    margin-top: 40px;
    margin-bottom: 20px;
  }

  .post-content p { margin-bottom: 25px; }

  .post-content blockquote {
    border-left: 4px solid #0274be;
    padding-left: 20px;
    margin-left: 0;
    font-style: italic;
    color: #666;
    background: #f9f9f9;
    padding: 20px;
  }

  .post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }

  .post-footer {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid #eee;
  }

  .tag {
    background: #f1f1f1;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 14px;
    margin-right: 8px;
    color: #666;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .post-title { font-size: 1.8rem; }
    .post-content { font-size: 16px; }
  }
</style>
