---
layout: default
---

<div class="astra-single-container">
  <article class="astra-article-content">
    
    <header class="entry-header">
      <div class="entry-meta">
        <span class="cat-links"><a href="/blog/">Blog</a></span>
      </div>
      <h1 class="entry-title">{{ page.title }}</h1>
      <div class="entry-meta-bottom">
        <span class="posted-on">{{ page.date | date: "%B %d, %Y" }}</span>
      </div>
    </header>

    {% if page.image %}
    <div class="post-thumb">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    </div>
    {% endif %}

    <div class="entry-content">
      {{ content }}
    </div>

    <footer class="entry-footer">
      <hr>
      <p>Terima kasih telah membaca artikel ini.</p>
    </footer>

  </article>
</div>

<style>
  /* Container Utama - Inilah yang membuat konten tidak mepet */
  .astra-single-container {
    max-width: 900px; /* Lebar maksimal konten */
    margin: 60px auto; /* Membuat kontainer di tengah (atas-bawah 60px, kiri-kanan otomatis) */
    padding: 0 40px;   /* Jarak aman dari pinggir layar di HP */
    background: #fff;
  }

  .astra-article-content {
    line-height: 1.8;
    color: #333;
    font-size: 18px;
  }

  .entry-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .entry-title {
    font-size: 2.5rem;
    color: #222;
    margin: 10px 0;
    font-weight: 700;
  }

  .entry-meta, .entry-meta-bottom {
    font-size: 14px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .entry-meta a {
    color: #0274be;
    text-decoration: none;
    font-weight: 600;
  }

  .post-thumb img {
    width: 100%;
    height: auto;
    border-radius: 4px;
    margin-bottom: 30px;
  }

  /* Spasi untuk paragraf agar tidak rapat */
  .entry-content p {
    margin-bottom: 25px;
  }

  /* Responsif untuk HP */
  @media (max-width: 600px) {
    .astra-single-container {
      margin: 20px auto;
      padding: 0 20px;
    }
    .entry-title {
      font-size: 1.8rem;
    }
  }
</style>
