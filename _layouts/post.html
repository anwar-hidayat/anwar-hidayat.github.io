---
layout: default
---
<article class="post-container">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        Publikasi: {{ page.date | date: "%d %B %Y" }}
      </time>
      {% if page.categories %}

        | Kategori: {{ page.categories | join: ", " }}
      {% endif %}
    </div>
  </header>

  {% if page.image %}
    <div class="post-featured-image">
      <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%; max-width:800px; height:auto;">
    </div>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="/">← Kembali ke Beranda</a>
  </footer>
</article>

<style>
  /* CSS Sederhana ala Astra (Bersih & Fokus Teks) */
  .post-container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; line-height: 1.6; color: #333; }
  .post-title { font-size: 2.5rem; margin-bottom: 10px; color: #222; }
  .post-meta { color: #777; margin-bottom: 30px; font-size: 0.9rem; }
  .post-content img { max-width: 100%; border-radius: 8px; }
  .post-content h2 { margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
  .post-footer { margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; }
</style>
