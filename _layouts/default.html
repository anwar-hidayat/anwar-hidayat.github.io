<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com" rel="stylesheet">

  <style>
    /* CSS Murni Ala Astra */
    :root { --astra-blue: #0274be; --astra-dark: #333; }
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fff; color: #444; }

    /* Header & Navigasi */
    .astra-header {
      background: #ffffff;
      border-bottom: 1px solid #f0f0f0;
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .header-container {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }
    .site-logo a {
      font-size: 22px;
      font-weight: 700;
      color: var(--astra-dark);
      text-decoration: none;
    }
    .astra-menu {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }
    .astra-menu li { margin-left: 20px; }
    .astra-menu li a {
      text-decoration: none;
      color: #555;
      font-weight: 500;
      font-size: 15px;
      transition: 0.2s;
    }
    .astra-menu li a:hover { color: var(--astra-blue); }

    /* Layout Utama (Kontainer Tengah) */
    .main-wrapper {
      max-width: 900px; /* Membatasi lebar konten keseluruhan */
      margin: 50px auto;
      padding: 0 20px;
    }

    /* Pengaturan Gambar (MAKSIMAL 600PX) */
    .main-wrapper img {
      max-width: 600px; /* Sesuai permintaan Anda */
      height: auto;
      display: block;
      margin: 30px auto; /* Gambar otomatis di tengah */
      border-radius: 4px;
    }

    /* Content Styling */
    .entry-content { line-height: 1.8; font-size: 18px; }

    /* Footer */
    footer { text-align: center; padding: 40px; border-top: 1px solid #eee; margin-top: 60px; font-size: 14px; color: #888; }

    /* Responsive */
    @media (max-width: 600px) {
      .header-container { flex-direction: column; text-align: center; gap: 10px; }
      .astra-menu li { margin: 0 10px; }
      .main-wrapper img { max-width: 100%; } /* Di HP tetap 100% agar tidak pecah */
    }
  </style>
  <!-- Script MathJax Terbaru & Kompatibel Jekyll -->
  <script src="https://polyfill.io"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net"></script>
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
  </script>
</head>
<body>

  <header class="astra-header">
    <div class="header-container">
      <div class="site-logo">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </div>
      <nav>
        <ul class="astra-menu">
          {% for item in site.data.navigation.main %}
          <li><a href="{{ item.url | relative_url }}">{{ item.name }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-wrapper">
    <div class="entry-content">
      {{ content }}
    </div>
  </main>

  <footer>
    &copy; {{ "now" | date: "%Y" }} {{ site.title }}. Made with Anwar Hidayat.
  </footer>

</body>
</html>
