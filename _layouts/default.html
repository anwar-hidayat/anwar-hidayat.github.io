<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  
  <!-- PERBAIKAN 1: Panggil file .css (Jekyll otomatis ubah .scss jadi .css) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <!-- PERBAIKAN 2: Tambahkan font Inter agar persis Astra -->
  <link href="https://fonts.googleapis.com" rel="stylesheet">

  <style>
    /* CSS Navigasi Anda sudah bagus, kita pertahankan */
    :root { --astra-blue: #0274be; --astra-dark: #222; }
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    .astra-header {
      background: #fff;
      border-bottom: 1px solid #eee;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      padding: 15px 0;
    }
    .header-container {
      max-width: 1000px; /* Lebar header */
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }
    /* ... (Sisa CSS navigasi Anda) ... */

    /* PERBAIKAN 3: Container untuk isi konten agar tidak mepet */
    .main-content-wrapper {
      max-width: 900px; /* Mengikuti $content-width di SCSS Anda */
      margin: 0 auto;
      padding: 40px 20px;
    }
  </style>
</head>
<body>

  <header class="astra-header">
    <div class="header-container">
      <div class="site-logo">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </div>
      <nav>
        <ul class="astra-menu">
          {% for item in site.data.navigation.main %}
          <li>
            <a href="{{ item.url | relative_url }}">{{ item.name }}</a>
          </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>

  <!-- PERBAIKAN 4: Bungkus content dengan class container -->
  <main class="main-content-wrapper">
    {{ content }}
  </main>

  <footer style="text-align:center; padding:40px; color:#888; font-size:14px; border-top:1px solid #eee; margin-top:50px;">
    &copy; {{ "now" | date: "%Y" }} {{ site.title }}. Powered by Anwar Hidayat.
  </footer>

</body>
</html>
