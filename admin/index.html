<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Anwar Hidayat</title>
  <!-- Menggunakan UNPKG sebagai alternatif JSDELIVR yang lebih stabil di beberapa ISP -->
  <script src="https://unpkg.com@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    // Fungsi inisialisasi CMS
    const initCMS = () => {
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "anwar-hidayat/anwar-hidayat.github.io",
            branch: "main",
            base_url: "https://anwar-hidayat.statistikian.workers.dev", // <--- GANTI INI
            auth_endpoint: "auth"
          },
          display_url: "https://anwar-hidayat.github.io",
          media_folder: "assets/images/posts",
          public_folder: "/assets/images/posts",
          collections: [
            {
              name: "blog",
              label: "Artikel",
              folder: "_posts",
              create: true,
              slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
              fields: [
                { label: "Layout", name: "layout", widget: "hidden", default: "post" },
                { label: "Judul", name: "title", widget: "string" },
                { label: "Tanggal", name: "date", widget: "datetime" },
                { label: "Isi Konten", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    };

    // Cek apakah CMS sudah ada, jika belum tunggu sebentar
    if (window.CMS) {
      initCMS();
    } else {
      window.addEventListener('DOMContentLoaded', () => {
        if (window.CMS) initCMS();
        else document.body.innerHTML = "<h2>Gagal memuat sistem. Coba matikan Ad-Blocker atau VPN Anda.</h2>";
      });
    }
  </script>
</body>
