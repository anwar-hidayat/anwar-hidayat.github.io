backend:
  name: github
  repo: anwar-hidayat/anwar-hidayat.github.io # Ganti dengan username/nama-repo-anda
  branch: master # Atau master, tergantung branch utama Anda
  site_domain: anwar-hidayat.github.io
  base_url: https://anwar-hidayat.statistikian.workers.dev/
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: "assets/images/posts" # Tempat menyimpan gambar artikel
public_folder: "/assets/images/posts"

collections:
  - name: "blog"
    label: "Artikel"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Judul Artikel", name: "title", widget: "string" }
      - { label: "Tanggal Publikasi", name: "date", widget: "datetime" }
      - { label: "Deskripsi SEO (Meta)", name: "description", widget: "text" }
      - { label: "Gambar Utama", name: "image", widget: "image", required: false }
      - { label: "Kategori", name: "categories", widget: "list" }
      - { label: "Isi Konten", name: "body", widget: "markdown" }
